<!DOCTYPE html>
<html lang="pt-BR"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Login — Yuna CRM</title>
<link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}"/>
<style>body{background:linear-gradient(135deg,#0D1A45 0%,#1A2B6B 55%,#1e3a9f 100%);display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px}
.lc{background:#fff;border-radius:20px;padding:38px 36px;width:100%;max-width:400px;box-shadow:0 24px 70px rgba(0,0,0,.3)}
.lh{text-align:center;margin-bottom:28px}
.li{width:64px;height:64px;background:var(--y);border-radius:16px;display:inline-flex;align-items:center;justify-content:center;font-family:"Fraunces",serif;font-size:2rem;font-weight:800;color:var(--nd);margin-bottom:12px}
.lt{font-family:"Fraunces",serif;font-size:1.6rem;font-weight:700;color:var(--n)}
.ls{font-size:.82rem;color:var(--gr);margin-top:4px}
.fg{margin-bottom:16px}
.fg label{display:block;font-size:.72rem;font-weight:700;color:var(--n);text-transform:uppercase;letter-spacing:.3px;margin-bottom:6px}
.fg input{width:100%;padding:12px 14px;border:1.5px solid var(--bd);border-radius:var(--r);font-size:.9rem;outline:none;transition:all .2s}
.fg input:focus{border-color:var(--n);box-shadow:0 0 0 3px rgba(26,43,107,.1)}
.bl{width:100%;padding:13px;background:var(--y);color:var(--nd);border:none;border-radius:var(--r);font-family:inherit;font-weight:700;font-size:.92rem;cursor:pointer;transition:all .25s;margin-top:4px}
.bl:hover{background:var(--yd);transform:translateY(-1px);box-shadow:0 6px 20px rgba(255,193,7,.4)}
.alert{padding:10px 14px;background:#FEE2E2;color:#DC2626;border-radius:var(--r);font-size:.82rem;font-weight:600;margin-bottom:16px;border:1px solid #FECACA}
.deco{position:fixed;inset:0;pointer-events:none;overflow:hidden}
.blob{position:absolute;border-radius:50%;filter:blur(80px);opacity:.12;animation:bf 8s ease-in-out infinite}
.b1{width:500px;height:500px;background:var(--y);top:-150px;right:-80px}
.b2{width:350px;height:350px;background:#4A90E2;bottom:-100px;left:-80px;animation-delay:4s}
@keyframes bf{0%,100%{transform:scale(1)}50%{transform:scale(1.1)}}</style>
</head><body>
<div class="deco"><div class="blob b1"></div><div class="blob b2"></div></div>
<div class="lc">
  <div class="lh"><div class="li">Y</div><div class="lt">YUNA CRM</div><div class="ls">Painel interno de gestão</div></div>
  {% if error %}<div class="alert">⚠️ {{ error }}</div>{% endif %}
  <form method="POST">
    <div class="fg"><label>Usuário</label><input type="text" name="username" placeholder="Seu usuário" required autofocus/></div>
    <div class="fg"><label>Senha</label><input type="password" name="password" placeholder="••••••••" required/></div>
    <button type="submit" class="bl">Entrar →</button>
  </form>
</div></body></html>
